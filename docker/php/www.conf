[www]
user = www
group = www
listen = 9000

; Dev-friendly: workers spawn on demand, idle out cheaply.
; For prod, mount a replacement www.conf (pm = dynamic, higher max_children).
pm = ondemand
pm.max_children = 10
pm.process_idle_timeout = 10s
pm.max_requests = 500

access.log = /proc/self/fd/2

catch_workers_output = yes
decorate_workers_output = no

; Allow docker-compose env to reach workers
clear_env = no
