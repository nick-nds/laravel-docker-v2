; Prod-stage PHP overrides (loaded last as 99-prod.ini)

[PHP]
expose_php = Off
upload_max_filesize = 100M
post_max_size = 100M
max_execution_time = 120
memory_limit = 256M

[Date]
date.timezone = UTC

[opcache]
; Production: never re-stat files; `php artisan optimize` clears the cache on deploy
opcache.validate_timestamps = 0
opcache.memory_consumption = 256
opcache.max_accelerated_files = 20000
opcache.interned_strings_buffer = 16
