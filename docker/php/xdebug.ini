[xdebug]
zend_extension = xdebug.so

; Mode can be overridden via the XDEBUG_MODE container env (see docker-compose).
xdebug.mode = debug,develop,coverage

; Xdebug only attaches when explicitly triggered — no per-request overhead.
; Web:  XDEBUG_SESSION cookie/query param (e.g. via Xdebug Helper extension)
; CLI:  XDEBUG_SESSION=1 env var (the artisan-debug helper script sets this)
xdebug.start_with_request = trigger

xdebug.client_host = host.docker.internal
xdebug.client_port = 9003
xdebug.idekey = PHPSTORM

; Log to storage/logs/xdebug.log; bump log_level to 7 when debugging connection issues.
xdebug.log = /var/www/storage/logs/xdebug.log
xdebug.log_level = 0

xdebug.max_nesting_level = 512
xdebug.discover_client_host = false
