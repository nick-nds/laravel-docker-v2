[xdebug]
zend_extension = xdebug.so

; Xdebug mode: debug for step debugging, develop for development helpers, coverage for code coverage
xdebug.mode = debug,develop,coverage

; Trigger Xdebug only when requested (not on every request)
; Use XDEBUG_SESSION cookie/query param for web requests
; Use XDEBUG_SESSION=1 environment variable for CLI/artisan
xdebug.start_with_request = trigger

; Client configuration
xdebug.client_host = host.docker.internal
xdebug.client_port = 9003

; IDE key for matching with your IDE configuration
xdebug.idekey = PHPSTORM

; Logging configuration (set log_level to 7 for debugging connection issues)
xdebug.log = /var/www/storage/logs/xdebug.log
xdebug.log_level = 0

; Performance settings
xdebug.max_nesting_level = 512

; Discover client host automatically (useful for Docker)
xdebug.discover_client_host = false
